    /* ─────────────── MODELO PREDICTIVO MEJORADO ─────────────── */
    const predict = (homeName, awayName) => {
      const eloH = ELO[homeName] || 1500;
      const eloA = ELO[awayName] || 1500;

      // Ventaja de local +50 ELO
      const diff = eloH - eloA + 50;
      const probH = 1 / (1 + Math.pow(10, -diff / 400));
      const probA = 1 / (1 + Math.pow(10, diff / 400));

      // Goles esperados con distribución de Poisson aproximada
      const baseGoals = 1.25;
      const lambdaH = baseGoals * (probH / 0.5);
      const lambdaA = baseGoals * (probA / 0.5);

      const poissonSample = (lambda) => {
        let L = Math.exp(-lambda), k = 0, p = 1;
        do { k++; p *= Math.random(); } while (p > L);
        return Math.max(0, k - 1);
      };

      const hGoals = poissonSample(lambdaH);
      const aGoals = poissonSample(lambdaA);

      // Confianza basada en diferencia ELO absoluta
      const eloDelta = Math.abs(diff);
      const rawConf = 50 + (eloDelta / 400) * 40;
      const confidence = Math.min(97, Math.max(42, Math.round(rawConf + (Math.random() * 10 - 5))));

      let winner = 'Empate';
      if (hGoals > aGoals) winner = homeName;
      if (aGoals > hGoals) winner = awayName;

      return {
        score: `${hGoals}-${aGoals}`,
        hGoals, aGoals, winner, confidence,
        stars: Math.round(confidence / 20),
        probH: Math.round(probH * 100),
        probA: Math.round(probA * 100)
      };
    };

            <circle cx="120" cy="72" r="12" fill="#312E81" opacity="0.25"/>

            {/* Línea de simetría decorativa */}
            <line x1="100" y1="28" x2="100" y2="140" stroke="#6D28D9" strokeWidth="0.5" opacity="0.15" strokeDasharray="3,6"/>

            {/* — Efecto piel / textura spots — */}
            {[[85,115,4],[112,120,3],[95,128,5],[107,105,3],[78,100,3.5]].map(([cx,cy,r],i) => (
              <circle key={i} cx={cx} cy={cy} r={r} fill="none" stroke="#6D28D9" strokeWidth="0.8" opacity="0.3"/>
            ))}

            {/* — OJOS — */}
            {/* Ojo izquierdo */}
            <g style={{animation: 'eyePulse 4s ease-in-out infinite'}}>
              <ellipse cx="78" cy="88" rx="14" ry="14" fill="url(#eyeGlowL)" filter="url(#blur4)" opacity="0.6"/>
              <ellipse cx="78" cy="88" rx="11" ry="11" fill={isActive ? '#065F46' : '#2D1B69'} stroke={isActive ? '#10F5A0' : '#8B5CF6'} strokeWidth="1.5"/>
              <ellipse cx="78" cy="88" rx="7" ry="7" fill={isActive ? '#059669' : '#4C1D95'}/>
              <ellipse cx="78" cy="88" rx="4" ry="4" fill={isActive ? '#10F5A0' : '#7C3AED'}/>
              <circle cx="74" cy="84" r="2" fill="white" opacity="0.9"/>
              <circle cx="80" cy="91" r="1" fill="white" opacity="0.5"/>
            </g>
            {/* Ojo derecho */}
            <g style={{animation: 'eyePulse 4s ease-in-out 0.5s infinite'}}>
              <ellipse cx="122" cy="88" rx="14" ry="14" fill="url(#eyeGlowR)" filter="url(#blur4)" opacity="0.6"/>
              <ellipse cx="122" cy="88" rx="11" ry="11" fill={isActive ? '#065F46' : '#2D1B69'} stroke={isActive ? '#10F5A0' : '#8B5CF6'} strokeWidth="1.5"/>
              <ellipse cx="122" cy="88" rx="7" ry="7" fill={isActive ? '#059669' : '#4C1D95'}/>
              <ellipse cx="122" cy="88" rx="4" ry="4" fill={isActive ? '#10F5A0' : '#7C3AED'}/>
              <circle cx="118" cy="84" r="2" fill="white" opacity="0.9"/>
              <circle cx="124" cy="91" r="1" fill="white" opacity="0.5"/>
            </g>

            {/* — Boca — */}
            <path d="M92,115 Q100,122 108,115" stroke={isActive ? '#10F5A0' : '#8B5CF6'} strokeWidth="2" fill="none" strokeLinecap="round" opacity="0.7"/>

            {/* — Corona mística cuando está activo — */}
            {isActive && (
              <g opacity="0.8">
                {[0,60,120,180,240,300].map((angle,i) => {
                  const rad = angle * Math.PI / 180;
                  const x = 100 + 52 * Math.cos(rad);
                  const y = 35 + 18 * Math.sin(rad);
                  return (
                    <circle key={i} cx={x} cy={y} r="2"
                      fill={i%2===0 ? '#A855F7' : '#10F5A0'}
                      style={{animation:`starTwinkle ${1.2+i*0.3}s ease-in-out ${i*0.2}s infinite`}}
                    />
                  );
                })}
              </g>
            )}
          </svg>
        </div>
      );
    };

    /* ══════════════════════════════════════════════════════
       COMPONENTE: TARJETA DE PREDICCIÓN
    ══════════════════════════════════════════════════════ */
    const PredCard = ({ match, idx }) => {
      const { home, away, homeCode, awayCode, group, prediction: p } = match;
      const isHome = p.winner === home;
      const isAway = p.winner === away;
      const isDraw = p.winner === 'Empate';

      return (
        <div style={{
          background: 'linear-gradient(135deg, #0D1520 0%, #0A1428 50%, #0D1520 100%)',
          border: '1px solid rgba(16,245,160,0.18)',
          borderRadius: '18px',
          padding: '1.1rem 1rem',
          marginBottom: '0.85rem',
          position: 'relative',
          overflow: 'hidden',
          animation: `fadeUp 0.5s ease-out ${idx * 0.12}s both`,
          boxShadow: '0 4px 32px rgba(0,0,0,0.5), inset 0 1px 0 rgba(16,245,160,0.08)'
        }}>
          {/* Línea superior esmeralda */}
          <div style={{
            position:'absolute',top:0,left:'10%',right:'10%',height:'1px',
            background:'linear-gradient(90deg,transparent,rgba(16,245,160,0.6),transparent)'
          }}/>
          {/* Esquina grupo */}
          <div style={{
            position:'absolute',top:'0.6rem',right:'0.7rem',
            fontSize:'9px',letterSpacing:'0.1em',
            color:'rgba(16,245,160,0.7)',
            fontFamily:'var(--font-body)',fontWeight:600,
            background:'rgba(16,245,160,0.08)',
            border:'1px solid rgba(16,245,160,0.2)',
            borderRadius:'6px',padding:'2px 6px'
          }}>GRP {group}</div>

          {/* Equipos */}
          <div style={{display:'flex',alignItems:'center',gap:'0.5rem',marginBottom:'0.85rem',marginTop:'0.15rem'}}>
            {/* Local */}
            <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:'4px'}}>
              <img
                src={flagUrl(homeCode)}
                alt={home}
                style={{
                  width:'42px',height:'30px',objectFit:'cover',
                  borderRadius:'5px',border: isHome ? '1.5px solid rgba(16,245,160,0.7)' : '1px solid rgba(255,255,255,0.1)',
                  boxShadow: isHome ? '0 0 10px rgba(16,245,160,0.4)' : 'none'
                }}
                onError={e=>e.target.style.display='none'}
              />
              <span style={{
                fontSize:'11px',fontWeight:600,color: isHome ? '#10F5A0' : '#C4C9E0',
                textAlign:'center',lineHeight:1.2,maxWidth:'68px',overflow:'hidden',whiteSpace:'nowrap',textOverflow:'ellipsis'
              }}>{home}</span>
            </div>

            {/* Score central */}
            <div style={{
              display:'flex',flexDirection:'column',alignItems:'center',gap:'2px',minWidth:'72px'
            }}>
              <div style={{
                fontSize:'28px',fontWeight:800,
                fontFamily:'var(--font-body)',letterSpacing:'2px',
                background:'linear-gradient(180deg, #10F5A0, #05B876)',
                WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent',
                lineHeight:1
              }}>{p.score}</div>
              <div style={{
                fontSize:'9px',letterSpacing:'0.15em',color:'rgba(255,255,255,0.3)',
                fontWeight:600,textTransform:'uppercase'
              }}>marcador</div>
              {isDraw && (
                <div style={{
                  fontSize:'9px',color:'rgba(168,85,247,0.8)',
                  background:'rgba(168,85,247,0.1)',border:'1px solid rgba(168,85,247,0.25)',
                  borderRadius:'4px',padding:'1px 6px',marginTop:'2px',fontWeight:600
                }}>EMPATE</div>
              )}
            </div>

            {/* Visitante */}
            <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:'4px'}}>
              <img
                src={flagUrl(awayCode)}
                alt={away}
                style={{
                  width:'42px',height:'30px',objectFit:'cover',
                  borderRadius:'5px',border: isAway ? '1.5px solid rgba(16,245,160,0.7)' : '1px solid rgba(255,255,255,0.1)',
                  boxShadow: isAway ? '0 0 10px rgba(16,245,160,0.4)' : 'none'
                }}
                onError={e=>e.target.style.display='none'}
              />
              <span style={{
                fontSize:'11px',fontWeight:600,color: isAway ? '#10F5A0' : '#C4C9E0',
                textAlign:'center',lineHeight:1.2,maxWidth:'68px',overflow:'hidden',whiteSpace:'nowrap',textOverflow:'ellipsis'
              }}>{away}</span>
            </div>
          </div>

          {/* Barra de probabilidades */}
          <div style={{marginBottom:'0.75rem'}}>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:'4px'}}>
              <span style={{fontSize:'10px',color:'rgba(16,245,160,0.8)',fontWeight:600}}>{p.probH}%</span>
              <span style={{fontSize:'10px',color:'rgba(255,255,255,0.3)',fontWeight:500}}>probabilidad</span>
              <span style={{fontSize:'10px',color:'rgba(168,85,247,0.8)',fontWeight:600}}>{p.probA}%</span>
            </div>
            <div style={{height:'4px',background:'rgba(255,255,255,0.06)',borderRadius:'2px',overflow:'hidden'}}>
              <div style={{height:'100%',width:`${p.probH}%`,borderRadius:'2px',
                background:'linear-gradient(90deg,rgba(16,245,160,0.8),rgba(56,189,248,0.6))',
                transition:'width 1s ease'
              }}/>
            </div>
          </div>

          {/* Confianza + estrellas */}
          <div style={{
            display:'flex',alignItems:'center',justifyContent:'space-between',
            background:'rgba(0,0,0,0.25)',borderRadius:'10px',padding:'0.45rem 0.75rem',
            border:'1px solid rgba(255,255,255,0.04)',marginBottom:'0.65rem'
          }}>
            <div style={{display:'flex',gap:'3px'}}>
              {[...Array(5)].map((_,i) => (
                <span key={i} style={{
                  fontSize:'13px',
                  opacity: i < p.stars ? 1 : 0.2,
                  filter: i < p.stars ? 'drop-shadow(0 0 4px rgba(16,245,160,0.8))' : 'none'
                }}>✦</span>
              ))}
            </div>
            <span style={{fontSize:'11px',fontWeight:700,
              color: p.confidence >= 75 ? '#10F5A0' : p.confidence >= 60 ? '#A855F7' : '#F59E0B'
            }}>{p.confidence}% confianza</span>
          </div>

          {/* Frase oracular */}
          <div style={{
            borderLeft:'2px solid rgba(168,85,247,0.4)',
            paddingLeft:'0.65rem'
          }}>
            <p style={{
              fontSize:'11.5px',color:'rgba(196,201,224,0.85)',
              fontStyle:'italic',lineHeight:1.5,margin:0
            }}>"{p.quote}"</p>
          </div>

          {/* Línea inferior */}
          <div style={{
            position:'absolute',bottom:0,left:'10%',right:'10%',height:'1px',
            background:'linear-gradient(90deg,transparent,rgba(168,85,247,0.3),transparent)'
          }}/>
        </div>
      );
    };

    /* ══════════════════════════════════════════════════════
       COMPONENTE: SELECTOR DE FECHA
    ══════════════════════════════════════════════════════ */
    const DatePicker = ({ value, onChange }) => {
      const [open, setOpen] = useState(false);
      return (
        <div style={{position:'relative'}}>
          <button
            onClick={() => setOpen(o => !o)}
            style={{
              display:'flex',alignItems:'center',gap:'8px',
              background:'rgba(168,85,247,0.1)',
              border:'1px solid rgba(168,85,247,0.3)',
              borderRadius:'12px',padding:'0.55rem 1rem',
              color:'#E9D5FF',fontSize:'13px',fontWeight:600,
              cursor:'pointer',fontFamily:'var(--font-body)',
              width:'100%',justifyContent:'space-between'
            }}
          >
            <span>📅 {value}</span>
            <span style={{opacity:0.6,fontSize:'11px'}}>{open ? '▲' : '▼'}</span>
          </button>
          {open && (
            <div style={{
              position:'absolute',top:'calc(100% + 6px)',left:0,right:0,
              background:'#0D1220',border:'1px solid rgba(168,85,247,0.3)',
              borderRadius:'12px',overflow:'hidden',zIndex:50,
              maxHeight:'220px',overflowY:'auto',
              boxShadow:'0 8px 32px rgba(0,0,0,0.7)'
            }}>
              {DATES.map(d => (
                <button key={d} onClick={() => { onChange(d); setOpen(false); }}
                  style={{
                    display:'block',width:'100%',textAlign:'left',
                    padding:'0.6rem 1rem',fontSize:'13px',
                    color: d === value ? '#10F5A0' : '#C4C9E0',
                    background: d === value ? 'rgba(16,245,160,0.08)' : 'transparent',
                    border:'none',cursor:'pointer',fontFamily:'var(--font-body)',
                    borderBottom:'1px solid rgba(255,255,255,0.04)'
                  }}
                >{d}</button>
              ))}
            </div>
          )}
        </div>
      );
    };

    /* ══════════════════════════════════════════════════════
       APP PRINCIPAL
    ══════════════════════════════════════════════════════ */
    const TRANCE_MSGS = [
      "Calculando distribuciones de Poisson...",
      "Procesando coeficientes ELO mundiales...",
      "Consultando las corrientes del destino...",
      "Ejecutando simulaciones Monte Carlo...",
      "Leyendo patrones históricos del abismo...",
      "Sintetizando inteligencia del océano...",
      "Analizando forma reciente y estadísticas...",
      "El Oráculo está descifrando el futuro..."
    ];

    export default function App() {
      const [phase, setPhase]             = useState('idle');
      const [date, setDate]               = useState('16 Jun 2026');
      const [predictions, setPredictions] = useState([]);
      const [tranceIdx, setTrancIdx]      = useState(0);
      const [error, setError]             = useState('');

      const matches = useMemo(() => MATCHUPS
        .filter(m => m.d === date)
        .map((m,i) => ({
          id:`${m.h}-${m.a}-${i}`,
          home: TEAMS[m.h]?.n || m.h,
          away: TEAMS[m.a]?.n || m.a,
          homeCode: m.h, awayCode: m.a, group: m.g
        })), [date]);

      useEffect(() => {
        if (phase !== 'trance') return;
        const t = setInterval(() => setTrancIdx(p => (p+1) % TRANCE_MSGS.length), 1400);
        return () => clearInterval(t);
      }, [phase]);

      const handleConsult = useCallback(async () => {
        if (phase === 'trance' || phase === 'consulting') return;
        if (!matches.length) { setError('No hay partidos en esta fecha.'); return; }

        setError(''); setPredictions([]); setPhase('consulting');
        await new Promise(r => setTimeout(r, 800));
        setPhase('trance');

        const minWait = new Promise(r => setTimeout(r, 3800));
        const results = matches.map(m => {
          const p = predict(m.home, m.away);
          return { ...m, prediction: { ...p, quote: getQuote(p.winner, p.confidence) } };
        });

        await minWait;
        setPredictions(results);
        setPhase('reveal');
      }, [phase, matches]);

      const handleDateChange = (d) => {
        setDate(d); setPredictions([]); setPhase('idle'); setError('');
      };

      const busy = phase === 'trance' || phase === 'consulting';

      /* Estrellas del fondo */
      const stars = useMemo(() =>
        [...Array(40)].map((_,i) => ({
          x: Math.random()*100, y: Math.random()*100,
          r: 0.5+Math.random()*1.5, d: 2+Math.random()*4, delay: Math.random()*3
        })), []);

      return (
        <div style={{
          minHeight:'100vh',background:'var(--bg-deep)',
          position:'relative',overflowX:'hidden',paddingBottom:'2.5rem'
        }}>
          {/* Fondo estelar SVG */}
          <svg style={{position:'fixed',inset:0,width:'100%',height:'100%',pointerEvents:'none',zIndex:0}} aria-hidden>
            {stars.map((s,i) => (
              <circle key={i} cx={`${s.x}%`} cy={`${s.y}%`} r={s.r}
                fill="white"
                style={{animation:`starTwinkle ${s.d}s ease-in-out ${s.delay}s infinite`}}
              />
            ))}
          </svg>

          {/* Nebulosas de fondo */}
          <div style={{position:'fixed',top:'-20%',left:'-20%',width:'60%',height:'60%',
            borderRadius:'50%',background:'radial-gradient(circle, rgba(88,28,135,0.18) 0%, transparent 70%)',
            pointerEvents:'none',zIndex:0,animation:'pulse-glow 6s ease-in-out infinite'}}/>
          <div style={{position:'fixed',bottom:'-15%',right:'-15%',width:'55%',height:'55%',
            borderRadius:'50%',background:'radial-gradient(circle, rgba(5,150,105,0.12) 0%, transparent 70%)',
            pointerEvents:'none',zIndex:0,animation:'pulse-glow 8s ease-in-out 2s infinite'}}/>

          {/* Contenido */}
          <div style={{
            maxWidth:'430px',margin:'0 auto',
            padding:'0 1rem',position:'relative',zIndex:1
          }}>

            {/* ── HEADER ── */}
            <header style={{textAlign:'center',paddingTop:'2rem',paddingBottom:'0.5rem'}}>
              <div style={{
                fontSize:'10px',letterSpacing:'0.3em',
                color:'rgba(168,85,247,0.7)',fontWeight:600,
                marginBottom:'0.5rem',textTransform:'uppercase',
                fontFamily:'var(--font-body)'
              }}>FIFA World Cup 2026 · Predictor</div>
              <h1 style={{
                fontFamily:'var(--font-title)',
                fontSize:'clamp(1.4rem, 6vw, 1.85rem)',
                fontWeight:900,lineHeight:1.1,
                background:'linear-gradient(135deg, #A855F7 0%, #7C3AED 40%, #10F5A0 100%)',
                WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent',
                letterSpacing:'-0.01em',marginBottom:'0.4rem'
              }}>
                El Oráculo<br/>del Pulpo
              </h1>
              <p style={{
                fontSize:'12px',
                color: phase==='reveal'
                  ? 'rgba(16,245,160,0.8)'
                  : busy ? 'rgba(168,85,247,0.8)' : 'rgba(196,201,224,0.5)',
                fontStyle:'italic',
                fontFamily:'var(--font-body)',
                transition:'color 0.6s ease',
                minHeight:'18px'
              }}>
                {phase==='idle'
                  ? '"Las corrientes del destino se agitan..."'
                  : phase==='reveal'
                  ? '"El océano ha revelado sus secretos."'
                  : '"Silencio... el Oráculo escucha el abismo."'}
              </p>
            </header>

            {/* ── PULPO ── */}
            <section style={{padding:'1.2rem 0 0.5rem'}}>
              <OctopusSVG state={phase}/>
              {/* Mensaje de trance */}
              <div style={{textAlign:'center',height:'28px',display:'flex',alignItems:'center',justifyContent:'center',marginTop:'0.25rem'}}>
                <p style={{
                  fontSize:'11px',fontFamily:'monospace',letterSpacing:'0.05em',
                  color:'rgba(168,85,247,0.75)',
                  opacity: busy ? 1 : 0,
                  transition:'opacity 0.4s ease',
                  margin:0
                }}>⬡ {TRANCE_MSGS[tranceIdx]}</p>
              </div>
            </section>

            {/* ── PANEL DE CONTROL ── */}
            <section style={{
              background:'rgba(13,18,32,0.85)',
              border:'1px solid rgba(168,85,247,0.2)',
              borderRadius:'20px',
              padding:'1.1rem',
              marginBottom:'1.5rem',
              backdropFilter:'blur(12px)',
              boxShadow:'0 8px 32px rgba(0,0,0,0.5), inset 0 1px 0 rgba(168,85,247,0.1)'
            }}>
              {/* Selector de fecha */}
              <div style={{marginBottom:'0.9rem'}}>
                <label style={{
                  display:'block',fontSize:'10px',fontWeight:600,
                  letterSpacing:'0.12em',color:'rgba(168,85,247,0.65)',
                  textTransform:'uppercase',marginBottom:'0.4rem',
                  fontFamily:'var(--font-body)'
                }}>Fecha de visión</label>
                <DatePicker value={date} onChange={handleDateChange}/>
              </div>

              {/* Partidos del día */}
              {matches.length > 0 && (
                <div style={{
                  background:'rgba(0,0,0,0.2)',borderRadius:'10px',
                  padding:'0.5rem 0.75rem',marginBottom:'0.9rem',
                  border:'1px solid rgba(255,255,255,0.04)'
                }}>
                  <span style={{fontSize:'10px',color:'rgba(16,245,160,0.6)',fontWeight:600,letterSpacing:'0.1em'}}>
                    {matches.length} PARTIDO{matches.length>1?'S':''} — {date}
                  </span>
                  <div style={{display:'flex',flexWrap:'wrap',gap:'4px',marginTop:'4px'}}>
                    {matches.map(m => (
                      <span key={m.id} style={{
                        fontSize:'10px',color:'rgba(196,201,224,0.6)',
                        background:'rgba(255,255,255,0.04)',
                        borderRadius:'4px',padding:'2px 6px'
                      }}>{m.home.split(' ')[0]} vs {m.away.split(' ')[0]}</span>
                    ))}
                  </div>
                </div>
              )}

              {/* Botón principal */}
              <button
                onClick={handleConsult}
                disabled={busy}
                style={{
                  width:'100%',
                  padding:'1rem',
                  borderRadius:'14px',
                  border: busy ? '1px solid rgba(255,255,255,0.06)' : '1px solid rgba(168,85,247,0.4)',
                  background: busy
                    ? 'rgba(255,255,255,0.04)'
                    : 'linear-gradient(135deg, rgba(88,28,135,0.9) 0%, rgba(109,40,217,0.9) 50%, rgba(5,150,105,0.4) 100%)',
                  color: busy ? 'rgba(255,255,255,0.25)' : '#F0EEF8',
                  fontSize:'15px',fontWeight:700,letterSpacing:'0.05em',
                  cursor: busy ? 'not-allowed' : 'pointer',
                  fontFamily:'var(--font-heading)',
                  boxShadow: busy ? 'none'
                    : '0 0 24px rgba(168,85,247,0.35), 0 4px 16px rgba(0,0,0,0.4)',
                  transition:'all 0.3s ease',
                  display:'flex',alignItems:'center',justifyContent:'center',gap:'8px'
                }}
              >
                {busy ? (
                  <>
                    <span style={{display:'inline-block',animation:'orb-spin 1.2s linear infinite',fontSize:'16px'}}>◌</span>
                    <span>Consultando...</span>
                  </>
                ) : (
                  <><span>🔮</span><span>Consultar al Oráculo</span></>
                )}
              </button>

              {error && (
                <p style={{
                  textAlign:'center',marginTop:'0.6rem',
                  fontSize:'12px',color:'rgba(239,68,68,0.7)',
                  fontFamily:'var(--font-body)'
                }}>⚠ {error}</p>
              )}
            </section>

            {/* ── PREDICCIONES ── */}
            {phase === 'reveal' && predictions.length > 0 && (
              <section>
                <div style={{textAlign:'center',marginBottom:'1.25rem',animation:'fadeUp 0.4s ease-out both'}}>
                  <h2 style={{
                    fontFamily:'var(--font-heading)',
                    fontSize:'1.2rem',fontWeight:700,
                    background:'linear-gradient(135deg,#A855F7,#10F5A0)',
                    WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent',
                    marginBottom:'4px'
                  }}>El Oráculo ha hablado</h2>
                  <div style={{
                    height:'1px',width:'80px',margin:'0 auto',
                    background:'linear-gradient(90deg,transparent,rgba(16,245,160,0.5),transparent)'
                  }}/>
                  <p style={{fontSize:'11px',color:'rgba(196,201,224,0.4)',marginTop:'6px',fontFamily:'var(--font-body)'}}>
                    {date}
                  </p>
                </div>
                {predictions.map((m,i) => <PredCard key={m.id} match={m} idx={i}/>)}
              </section>
            )}

            {/* ── FOOTER ── */}
            <footer style={{textAlign:'center',paddingTop:'1.5rem'}}>
              <p style={{
                fontSize:'9px',letterSpacing:'0.2em',
                color:'rgba(255,255,255,0.12)',
                fontFamily:'var(--font-body)',textTransform:'uppercase'
              }}>
                Oráculo del Pulpo · Mundial 2026 · Solo entretenimiento
              </p>
            </footer>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(r => console.log('SW registrado:', r.scope))
          .catch(e => console.warn('SW error:', e));
      });
    }
  </script>
</body>
