      0%,100% { transform: translateY(0px); }

      0%,100% { opacity: 0.5; }

      from { transform: rotate(0deg); }

function flagUrl(code) {
  const t = TEAMS[code];
  const fc = (t && t.fc) ? t.fc : code.toLowerCase();
  return 'https://flagcdn.com/w80/' + fc + '.png';
}

function teamName(code) {
  return (TEAMS[code] && TEAMS[code].n) ? TEAMS[code].n : code;
}

function poissonSample(lambda) {
  var L = Math.exp(-lambda), k = 0, p = 1;
  do { k++; p *= Math.random(); } while (p > L);
  return Math.max(0, k - 1);
}

function predict(homeName, awayName) {
  var eloH = ELO[homeName] || 1500;
  var eloA = ELO[awayName] || 1500;
  var diff  = eloH - eloA + 50;
  var probH = 1 / (1 + Math.pow(10, -diff / 400));
  var probA = 1 - probH;
  var base  = 1.25;
  var hGoals = poissonSample(base * probH / 0.5);
  var aGoals = poissonSample(base * probA / 0.5);
  var eloDelta = Math.abs(diff);
  var conf = Math.min(97, Math.max(42, Math.round(50 + (eloDelta / 400) * 40 + (Math.random() * 10 - 5))));
  var winner = 'Empate';
  if (hGoals > aGoals) winner = homeName;
  if (aGoals > hGoals) winner = awayName;
  var cat = conf < 55 ? 'chaos' : winner === 'Empate' ? 'draw' : 'win';
  var pool = QUOTES[cat];
  var quote = pool[Math.floor(Math.random() * pool.length)].replace('{w}', winner);
  return {
    score: hGoals + '-' + aGoals,
    hGoals: hGoals, aGoals: aGoals,
    winner: winner,
    confidence: conf,
    stars: Math.round(conf / 20),
    probH: Math.round(probH * 100),
    probA: Math.round(probA * 100),
    quote: quote
  };
}

          stroke="#7C3AED" strokeWidth="4.5" fill="none" strokeLinecap="round" opacity="0.55"/>

        <path d="M118,144 C132,172 134,196 140,218 C142,226 135,226 132,218 C128,196 124,172 114,146"
          stroke="#5B21B6" strokeWidth="11" fill="none" strokeLinecap="round"
          style={{animation: trance ? 'float 3.5s ease-in-out infinite reverse' : 'float 7.5s ease-in-out infinite reverse'}}/>
        <path d="M118,144 C132,172 134,196 140,218 C142,226 135,226 132,218 C128,196 124,172 114,146"
          stroke="#8B5CF6" strokeWidth="4.5" fill="none" strokeLinecap="round" opacity="0.55"/>

        <path d="M134,132 C154,156 170,176 174,210 C176,220 170,222 166,215 C164,200 148,178 136,158"
          stroke="#5B21B6" strokeWidth="12" fill="none" strokeLinecap="round"
          style={{animation: trance ? 'float 3s ease-in-out infinite' : 'float 6.8s ease-in-out infinite'}}/>
        <path d="M134,132 C154,156 170,176 174,210 C176,220 170,222 166,215 C164,200 148,178 136,158"
          stroke="#8B5CF6" strokeWidth="5" fill="none" strokeLinecap="round" opacity="0.55"/>

        {/* Ventosas */}
        {[[48,166],[40,188],[70,183],[64,205],[100,173],[100,198],[130,183],[136,205],[152,166],[160,188]].map(function(pt, i) {
          return <circle key={i} cx={pt[0]} cy={pt[1]} r="3.5" fill="#1A0A3E" stroke="#A855F7" strokeWidth="1" opacity="0.72"/>;
        })}

        {/* Cuerpo */}
        <ellipse cx="100" cy="80" rx="56" ry="63" fill="url(#bodyG)" stroke="#7C3AED" strokeWidth="1.5"/>
        <ellipse cx="100" cy="58" rx="38" ry="27" fill="url(#shineG)"/>
        <circle cx="80" cy="70" r="13" fill="#4C1D95" opacity="0.28"/>
        <circle cx="120" cy="72" r="11" fill="#312E81" opacity="0.22"/>
        <circle cx="100" cy="108" r="20" fill="#1E1B4B" opacity="0.28"/>
        {[[83,114,4],[110,119,3.5],[95,127,5],[107,104,3],[78,99,3]].map(function(s,i){
          return <circle key={i} cx={s[0]} cy={s[1]} r={s[2]} fill="none" stroke="#6D28D9" strokeWidth="0.8" opacity="0.3"/>;
        })}

        {/* Ojo izquierdo */}
        <ellipse cx="78" cy="86" rx="14" ry="14" fill="url(#eyeHL)"/>
        <g style={{animation:'eyeBlink 4s ease-in-out infinite'}}>
          <ellipse cx="78" cy="86" rx="11" ry="11" fill={eyeFill} stroke={eyeStroke} strokeWidth="1.5"/>
          <ellipse cx="78" cy="86" rx="7"  ry="7"  fill={active ? '#059669' : '#4C1D95'}/>
          <ellipse cx="78" cy="86" rx="4"  ry="4"  fill={eyeColor}/>
          <circle  cx="74" cy="82" r="2.2" fill="white" opacity="0.9"/>
          <circle  cx="80" cy="90" r="1"   fill="white" opacity="0.4"/>
        </g>

        {/* Ojo derecho */}
        <ellipse cx="122" cy="86" rx="14" ry="14" fill="url(#eyeHR)"/>
        <g style={{animation:'eyeBlink 4s ease-in-out 0.5s infinite'}}>
          <ellipse cx="122" cy="86" rx="11" ry="11" fill={eyeFill} stroke={eyeStroke} strokeWidth="1.5"/>
          <ellipse cx="122" cy="86" rx="7"  ry="7"  fill={active ? '#059669' : '#4C1D95'}/>
          <ellipse cx="122" cy="86" rx="4"  ry="4"  fill={eyeColor}/>
          <circle  cx="118" cy="82" r="2.2" fill="white" opacity="0.9"/>
          <circle  cx="124" cy="90" r="1"   fill="white" opacity="0.4"/>
        </g>

        {/* Boca */}
        <path d="M90,112 Q100,120 110,112" stroke={active ? '#10F5A0' : '#8B5CF6'} strokeWidth="2" fill="none" strokeLinecap="round" opacity="0.7"/>

        {/* Corona activa */}
        {active && [0,60,120,180,240,300].map(function(angle, i) {
          var rad = angle * Math.PI / 180;
          var cx  = 100 + 52 * Math.cos(rad);
          var cy  = 33  + 18 * Math.sin(rad);
          return (
            <circle key={i} cx={cx} cy={cy} r="2"
              fill={i % 2 === 0 ? '#A855F7' : '#10F5A0'}
              style={{animation:'starTwinkle '+(1.2+i*0.3)+'s ease-in-out '+(i*0.2)+'s infinite'}}
            />
          );
        })}
      </svg>
    </div>
  );
}

/* ═══════════════════════════════════════════
   COMPONENTE: TARJETA PREDICCIÓN
═══════════════════════════════════════════ */
function PredCard({ match, idx }) {
  var p = match.prediction;
  var isHome = p.winner === match.home;
  var isAway = p.winner === match.away;

  return (
    <div className="pred-card" style={{animationDelay: (idx * 0.12) + 's'}}>
      <div className="line-top"/>

      {/* Badge grupo */}
      <div style={{position:'absolute',top:'0.6rem',right:'0.7rem',
        fontSize:'9px',letterSpacing:'0.1em',color:'rgba(16,245,160,0.75)',
        background:'rgba(16,245,160,0.08)',border:'1px solid rgba(16,245,160,0.2)',
        borderRadius:'6px',padding:'2px 6px',fontWeight:600}}>
        GRP {match.group}
      </div>

      {/* Equipos */}
      <div style={{display:'flex',alignItems:'center',gap:'6px',marginBottom:'0.85rem',marginTop:'0.15rem'}}>
        {/* Local */}
        <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:'4px'}}>
          <img src={flagUrl(match.homeCode)} alt={match.home}
            style={{width:'42px',height:'30px',objectFit:'cover',borderRadius:'5px',
              border: isHome ? '1.5px solid rgba(16,245,160,0.75)' : '1px solid rgba(255,255,255,0.1)',
              boxShadow: isHome ? '0 0 10px rgba(16,245,160,0.4)' : 'none'}}
            onError={function(e){e.target.style.display='none';}}/>
          <span style={{fontSize:'11px',fontWeight:600,
            color: isHome ? '#10F5A0' : '#C4C9E0',
            textAlign:'center',lineHeight:1.2,
            maxWidth:'68px',overflow:'hidden',whiteSpace:'nowrap',textOverflow:'ellipsis'}}>
            {match.home}
          </span>
        </div>

        {/* Score */}
        <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:'2px',minWidth:'72px'}}>
          <span className="score-gradient" style={{fontSize:'28px',fontWeight:800,letterSpacing:'2px',lineHeight:1}}>
            {p.score}
          </span>
          <span style={{fontSize:'9px',letterSpacing:'0.15em',color:'rgba(255,255,255,0.3)',fontWeight:600,textTransform:'uppercase'}}>
            marcador
          </span>
          {p.winner === 'Empate' && (
            <span style={{fontSize:'9px',color:'rgba(168,85,247,0.85)',
              background:'rgba(168,85,247,0.1)',border:'1px solid rgba(168,85,247,0.25)',
              borderRadius:'4px',padding:'1px 6px',marginTop:'2px',fontWeight:600}}>
              EMPATE
            </span>
          )}
        </div>

        {/* Visitante */}
        <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:'4px'}}>
          <img src={flagUrl(match.awayCode)} alt={match.away}
            style={{width:'42px',height:'30px',objectFit:'cover',borderRadius:'5px',
              border: isAway ? '1.5px solid rgba(16,245,160,0.75)' : '1px solid rgba(255,255,255,0.1)',
              boxShadow: isAway ? '0 0 10px rgba(16,245,160,0.4)' : 'none'}}
            onError={function(e){e.target.style.display='none';}}/>
          <span style={{fontSize:'11px',fontWeight:600,
            color: isAway ? '#10F5A0' : '#C4C9E0',
            textAlign:'center',lineHeight:1.2,
            maxWidth:'68px',overflow:'hidden',whiteSpace:'nowrap',textOverflow:'ellipsis'}}>
            {match.away}
          </span>
        </div>
      </div>

      {/* Barra de probabilidades */}
      <div style={{marginBottom:'0.75rem'}}>
        <div style={{display:'flex',justifyContent:'space-between',marginBottom:'4px'}}>
          <span style={{fontSize:'10px',color:'rgba(16,245,160,0.85)',fontWeight:700}}>{p.probH}%</span>
          <span style={{fontSize:'10px',color:'rgba(255,255,255,0.28)',fontWeight:500}}>probabilidad</span>
          <span style={{fontSize:'10px',color:'rgba(168,85,247,0.85)',fontWeight:700}}>{p.probA}%</span>
        </div>
        <div style={{height:'4px',background:'rgba(255,255,255,0.06)',borderRadius:'2px',overflow:'hidden'}}>
          <div style={{height:'100%',width:p.probH+'%',borderRadius:'2px',
            background:'linear-gradient(90deg, rgba(16,245,160,0.85), rgba(56,189,248,0.65))'}}/>
        </div>
      </div>

      {/* Confianza */}
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',
        background:'rgba(0,0,0,0.28)',borderRadius:'10px',padding:'0.45rem 0.75rem',
        border:'1px solid rgba(255,255,255,0.04)',marginBottom:'0.65rem'}}>
        <div style={{display:'flex',gap:'3px'}}>
          {[0,1,2,3,4].map(function(i){
            return (
              <span key={i} style={{fontSize:'13px',
                opacity: i < p.stars ? 1 : 0.18,
                filter: i < p.stars ? 'drop-shadow(0 0 4px rgba(16,245,160,0.85))' : 'none'}}>✦</span>
            );
          })}
        </div>
        <span style={{fontSize:'11px',fontWeight:700,
          color: p.confidence >= 75 ? '#10F5A0' : p.confidence >= 60 ? '#A855F7' : '#F59E0B'}}>
          {p.confidence}% confianza
        </span>
      </div>

      {/* Frase oracular */}
      <div style={{borderLeft:'2px solid rgba(168,85,247,0.4)',paddingLeft:'0.65rem'}}>
        <p style={{fontSize:'11.5px',color:'rgba(196,201,224,0.88)',fontStyle:'italic',lineHeight:1.55,margin:0}}>
          "{p.quote}"
        </p>
      </div>

      <div className="line-bottom"/>
    </div>
  );
}

/* ═══════════════════════════════════════════
   COMPONENTE: SELECTOR FECHA
═══════════════════════════════════════════ */
function DateSelector({ value, onChange }) {
  return (
    <div style={{position:'relative'}}>
      <select value={value} onChange={function(e){onChange(e.target.value);}}>
        {DATES.map(function(d){
          return <option key={d} value={d}>{d}</option>;
        })}
      </select>
      <span style={{position:'absolute',right:'10px',top:'50%',transform:'translateY(-50%)',
        color:'rgba(168,85,247,0.6)',pointerEvents:'none',fontSize:'11px'}}>▼</span>
    </div>
  );
}

/* ═══════════════════════════════════════════
   APP PRINCIPAL
═══════════════════════════════════════════ */
function App() {
  var useState    = React.useState;
  var useEffect   = React.useEffect;
  var useMemo     = React.useMemo;
  var useCallback = React.useCallback;

  var phaseState      = useState('idle');
  var phase           = phaseState[0]; var setPhase = phaseState[1];
  var dateState       = useState('16 Jun 2026');
  var date            = dateState[0];  var setDate  = dateState[1];
  var predsState      = useState([]);
  var predictions     = predsState[0]; var setPredictions = predsState[1];
  var tranceState     = useState(0);
  var tranceIdx       = tranceState[0]; var setTrancIdx = tranceState[1];
  var errorState      = useState('');
  var error           = errorState[0];  var setError   = errorState[1];

  var matches = useMemo(function() {
    return MATCHUPS
      .filter(function(m){ return m.d === date; })
      .map(function(m, i){
        return {
          id: m.h + '-' + m.a + '-' + i,
          home: teamName(m.h),
          away: teamName(m.a),
          homeCode: m.h,
          awayCode: m.a,
          group: m.g
        };
      });
  }, [date]);

  useEffect(function() {
    if (phase !== 'trance') return;
    var t = setInterval(function(){ setTrancIdx(function(p){ return (p+1) % TRANCE.length; }); }, 1400);
    return function(){ clearInterval(t); };
  }, [phase]);

  var handleConsult = useCallback(function() {
    if (phase === 'trance' || phase === 'consulting') return;
    if (!matches.length) { setError('No hay partidos en esta fecha.'); return; }
    setError(''); setPredictions([]); setPhase('consulting');
    setTimeout(function(){ setPhase('trance'); }, 700);
    var waited = new Promise(function(r){ setTimeout(r, 3600); });
    var results = matches.map(function(m){
      var p = predict(m.home, m.away);
      return Object.assign({}, m, { prediction: p });
    });
    waited.then(function(){
      setPredictions(results);
      setPhase('reveal');
    });
  }, [phase, matches]);

  var handleDateChange = function(d) {
    setDate(d); setPredictions([]); setPhase('idle'); setError('');
  };

  var busy = phase === 'trance' || phase === 'consulting';

  /* Estrellas fijas de fondo */
  var stars = useMemo(function(){
    return Array.from({length:40}, function(_,i){
      return {
        x: Math.random()*100,
        y: Math.random()*100,
        r: 0.5 + Math.random()*1.5,
        d: 2   + Math.random()*4,
        delay: Math.random()*3
      };
    });
  }, []);

  var subtitleText =
    phase === 'idle'   ? '"Las corrientes del destino se agitan..."' :
    phase === 'reveal' ? '"El océano ha revelado sus secretos."'     :
                         '"Silencio... el Oráculo escucha el abismo."';

  var subtitleColor =
    phase === 'reveal' ? 'rgba(16,245,160,0.85)'   :
    busy               ? 'rgba(168,85,247,0.85)'   :
                         'rgba(196,201,224,0.45)';

  return (
    <div style={{minHeight:'100vh',background:'var(--bg-deep)',position:'relative',overflowX:'hidden',paddingBottom:'2.5rem'}}>

      {/* Fondo estelar */}
      <svg style={{position:'fixed',inset:0,width:'100%',height:'100%',pointerEvents:'none',zIndex:0}} aria-hidden="true">
        {stars.map(function(s,i){
          return (
            <circle key={i} cx={s.x+'%'} cy={s.y+'%'} r={s.r} fill="white"
              style={{animation:'starTwinkle '+s.d+'s ease-in-out '+s.delay+'s infinite'}}/>
          );
        })}
      </svg>

      {/* Nebulosas */}
      <div style={{position:'fixed',top:'-20%',left:'-20%',width:'60%',height:'60%',
        borderRadius:'50%',background:'radial-gradient(circle, rgba(88,28,135,0.18) 0%, transparent 70%)',
        pointerEvents:'none',zIndex:0,animation:'pulse-glow 6s ease-in-out infinite'}}/>
      <div style={{position:'fixed',bottom:'-15%',right:'-15%',width:'55%',height:'55%',
        borderRadius:'50%',background:'radial-gradient(circle, rgba(5,150,105,0.12) 0%, transparent 70%)',
        pointerEvents:'none',zIndex:0,animation:'pulse-glow 8s ease-in-out 2s infinite'}}/>

      {/* Contenido */}
      <div style={{maxWidth:'430px',margin:'0 auto',padding:'0 1rem',position:'relative',zIndex:1}}>

        {/* HEADER */}
        <header style={{textAlign:'center',paddingTop:'2rem',paddingBottom:'0.5rem'}}>
          <div style={{fontSize:'10px',letterSpacing:'0.28em',color:'rgba(168,85,247,0.65)',
            fontWeight:600,marginBottom:'0.5rem',textTransform:'uppercase'}}>
            FIFA World Cup 2026 · Predictor
          </div>
          <h1 className="title-gradient" style={{
            fontFamily:'var(--font-title)',
            fontSize:'clamp(1.35rem, 6vw, 1.8rem)',
            fontWeight:900,lineHeight:1.12,
            letterSpacing:'-0.01em',marginBottom:'0.4rem'
          }}>
            El Oráculo<br/>del Pulpo
          </h1>
          <p style={{fontSize:'12px',color:subtitleColor,fontStyle:'italic',
            transition:'color 0.6s ease',minHeight:'18px'}}>
            {subtitleText}
          </p>
        </header>

        {/* PULPO */}
        <section style={{padding:'1.2rem 0 0.5rem'}}>
          <OctopusSVG phase={phase}/>
          <div style={{textAlign:'center',height:'28px',display:'flex',alignItems:'center',justifyContent:'center',marginTop:'0.3rem'}}>
            <p style={{fontSize:'11px',fontFamily:'monospace',letterSpacing:'0.05em',
              color:'rgba(168,85,247,0.8)',opacity: busy ? 1 : 0,
              transition:'opacity 0.4s ease',margin:0}}>
              ⬡ {TRANCE[tranceIdx]}
            </p>
          </div>
        </section>

        {/* PANEL CONTROL */}
        <section className="panel" style={{marginBottom:'1.5rem'}}>
          {/* Selector fecha */}
          <div style={{marginBottom:'0.9rem'}}>
            <label style={{display:'block',fontSize:'10px',fontWeight:600,
              letterSpacing:'0.12em',color:'rgba(168,85,247,0.65)',
              textTransform:'uppercase',marginBottom:'0.4rem'}}>
              Fecha de visión
            </label>
            <DateSelector value={date} onChange={handleDateChange}/>
          </div>

          {/* Partidos del día */}
          {matches.length > 0 && (
            <div style={{background:'rgba(0,0,0,0.22)',borderRadius:'10px',
              padding:'0.5rem 0.75rem',marginBottom:'0.9rem',
              border:'1px solid rgba(255,255,255,0.04)'}}>
              <span style={{fontSize:'10px',color:'rgba(16,245,160,0.65)',fontWeight:600,letterSpacing:'0.1em'}}>
                {matches.length} PARTIDO{matches.length > 1 ? 'S' : ''} — {date}
              </span>
              <div style={{display:'flex',flexWrap:'wrap',gap:'4px',marginTop:'4px'}}>
                {matches.map(function(m){
                  return (
                    <span key={m.id} style={{fontSize:'10px',color:'rgba(196,201,224,0.55)',
                      background:'rgba(255,255,255,0.04)',borderRadius:'4px',padding:'2px 6px'}}>
                      {m.home.split(' ')[0]} vs {m.away.split(' ')[0]}
                    </span>
                  );
                })}
              </div>
            </div>
          )}

          {/* Botón */}
          <button className="btn-oracle" onClick={handleConsult} disabled={busy}>
            {busy
              ? <><span style={{display:'inline-block',animation:'orb-spin 1.2s linear infinite',fontSize:'16px'}}>◌</span><span>Consultando...</span></>
              : <><span>🔮</span><span>Consultar al Oráculo</span></>
            }
          </button>

          {error && (
            <p style={{textAlign:'center',marginTop:'0.6rem',fontSize:'12px',color:'rgba(239,68,68,0.75)'}}>
              ⚠ {error}
            </p>
          )}
        </section>

        {/* PREDICCIONES */}
        {phase === 'reveal' && predictions.length > 0 && (
          <section style={{animation:'fadeUp 0.4s ease-out both'}}>
            <div style={{textAlign:'center',marginBottom:'1.2rem'}}>
              <h2 className="reveal-gradient" style={{
                fontFamily:'var(--font-heading)',fontSize:'1.2rem',fontWeight:700,marginBottom:'4px'}}>
                El Oráculo ha hablado
              </h2>
              <div style={{height:'1px',width:'80px',margin:'0 auto',
                background:'linear-gradient(90deg,transparent,rgba(16,245,160,0.5),transparent)'}}/>
              <p style={{fontSize:'11px',color:'rgba(196,201,224,0.38)',marginTop:'6px'}}>{date}</p>
            </div>
            {predictions.map(function(m, i){
              return <PredCard key={m.id} match={m} idx={i}/>;
            })}
          </section>
        )}

        {/* FOOTER */}
        <footer style={{textAlign:'center',paddingTop:'1.5rem'}}>
          <p style={{fontSize:'9px',letterSpacing:'0.2em',color:'rgba(255,255,255,0.1)',textTransform:'uppercase'}}>
            Oráculo del Pulpo · Mundial 2026 · Solo entretenimiento
          </p>
        </footer>
      </div>
    </div>
  );
}

/* ── Render ── */
var container = document.getElementById('root');
var reactRoot = ReactDOM.createRoot(container);
reactRoot.render(React.createElement(App, null));
</script>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function() {
      navigator.serviceWorker.register('./sw.js')
        .then(function(r){ console.log('SW OK:', r.scope); })
        .catch(function(e){ console.warn('SW error:', e); });
    });
  }
</script>
</body>
</html>
